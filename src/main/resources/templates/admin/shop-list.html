
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All SubCategories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #eef2f7; /* light gray background like admin manage */
        }

        /* ✅ Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c3e50; /* dark admin blue */
            padding: 12px 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: bold;
        }
        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }
        .navbar ul li {
            display: inline;
        }
        .navbar ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s, color 0.3s;
            padding: 6px 12px;
            border-radius: 6px;
        }
        .navbar ul li a:hover {
            background: #34495e; /* hover darker blue */
        }
        .navbar ul li a.active {
            background: #f39c12; /* yellow active */
            color: black;
        }

        /* ✅ Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: #2c3e50; /* match navbar */
            color: white;
            padding-top: 60px;
            transition: 0.3s ease-in-out;
            z-index: 2000;
        }
        .sidebar.active {
            left: 0;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar ul li {
            padding: 15px 20px;
        }
        .sidebar ul li a {
            color: white;
            text-decoration: none;
            display: block;
            transition: background 0.3s;
        }
        .sidebar ul li a:hover {
            background: #34495e;
            border-radius: 6px;
        }
        .sidebar .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
        }

        /* ✅ Sidebar toggle button */
        .toggle-btn {
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
            display: inline-block;
        }

        h2 {
            text-align: center;
            margin: 20px 0 10px;
            color: #2c3e50;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px;
        }

        .top-bar input[type="text"] {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .total-count {
            font-weight: bold;
            font-size: 14px;
            color: #2c3e50;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-edit { background: #f39c12; color: black; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-add { background: #27ae60; color: white; }

        table {
            width: 95%;
            margin: auto;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #2c3e50;
            color: white;
        }
        tr:hover {
            background: #f9f9f9;
        }
        img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<!-- ✅ Navbar -->
<div class="navbar">
    <div class="logo">
         Admin Panel
    </div>
    <ul>
        <li><a th:href="@{/admin/dashboard}"><i class="fa fa-home"></i> Home</a></li>
        <li><a th:href="@{/admin/category/all}"><i class="fa fa-list"></i> Category</a></li>
        <li><a th:href="@{/admin/shop/all}"><i class="fa fa-box"></i> Shop</a></li>
        <li><a th:href="@{/admin/master/manage}" sec:authorize="hasRole('MASTER')" ><i class="fa fa-user-shield"></i> Admin</a></li>
        <li>		<a th:href="@{/admin/bid/history/all}" class="btn btn-info"><i class="fas fa-boxes-stacked"></i>
					     Bid History
					</a></li>
        <li><a th:href="@{/admin/logout}"> <i class="fa fa-sign-out-alt"></i> Logout</a></li>
    </ul>
</div>



<h2>SubCategory List</h2>

<div class="top-bar">
    <a th:href="@{/admin/shop/add}" class="btn btn-add"><i class="fa fa-plus"></i> Add Shop</a>
    <input type="text" id="searchInput" placeholder="Search by name or category...">
    <div class="total-count">Total Shop: <span id="totalCount" th:text="${#lists.size(shops)}"></span></div>
</div>


<table id="productTable">

<thead>
<tr>
    <th>#</th>
    <th>Name</th>
    <th>Min Bid</th>
    <th>Primary Image</th>
	<th>Start Date</th>   
	  <th>End Date</th>  
    <th>Category</th>
    <th>Actions</th>
</tr>
</thead>
<tbody>
<tr th:each="s, stat : ${shops}">
    <td th:text="${stat.index + 1}"></td>
    <td th:text="${s.shopName}"></td>
    <td th:text="${s.minBid}"></td>
    <td>
        <img th:if="${s.shop_primaryImg}"
             th:src="@{${s.shop_primaryImg}}" />
    </td>

	<!-- ✅ Start Date -->
	<td th:text="${#temporals.format(s.startDate, 'dd-MM-yyyy')}"></td>

	<!-- ✅ End Date -->
	<td th:text="${#temporals.format(s.endDate, 'dd-MM-yyyy')}"></td>
    <td th:text="${s.category.categoryName}"></td>
    <td>
        <a th:href="@{'/admin/shop/edit/' + ${s.id}}" class="btn btn-edit">Edit</a>
        <a th:href="@{'/admin/shop/delete/' + ${s.id}}"
           class="btn btn-delete"
           onclick="return confirm('Delete this shop?')">Delete</a>
    </td>
</tr>
</tbody>
</table>

<script>
    // ✅ Sidebar toggle
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
    }

    // ✅ Real-time search
    const searchInput = document.getElementById('searchInput');
    const table = document.getElementById('productTable');
    const totalCountEl = document.getElementById('totalCount');

    searchInput.addEventListener('keyup', function() {
        const filter = searchInput.value.toLowerCase();
        const rows = table.tBodies[0].rows;
        let visibleCount = 0;

        for (let i = 0; i < rows.length; i++) {
            const name = rows[i].cells[1].textContent.toLowerCase();
            const category = rows[i].cells[4].textContent.toLowerCase();
            if (name.includes(filter) || category.includes(filter)) {
                rows[i].style.display = '';
                rows[i].cells[0].textContent = visibleCount + 1; 
                visibleCount++;
            } else {
                rows[i].style.display = 'none';
            }
        }
        totalCountEl.textContent = visibleCount;
    });
</script>

</body>
</html>
