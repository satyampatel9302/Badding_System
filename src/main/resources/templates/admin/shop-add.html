
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Shop</title>
	<style>
	    :root {
	        --primary: #2563eb;
	        --primary-hover: #1e40af;
	        --bg: #f1f5f9;
	        --card-bg: #ffffff;
	        --text-dark: #1f2933;
	        --text-muted: #6b7280;
	        --border: #d1d5db;
	        --radius: 10px;
	    }

	    * {
	        box-sizing: border-box;
	    }

	    body {
	        font-family: 'Inter', 'Segoe UI', sans-serif;
	        background: linear-gradient(135deg, #eef2ff, #f8fafc);
	        display: flex;
	        justify-content: center;
	        align-items: center;
	        min-height: 100vh;
	        margin: 0;
	        color: var(--text-dark);
	    }

	    .form-container {
	        background: var(--card-bg);
	        padding: 32px 36px;
	        border-radius: 16px;
	        width: 520px;
	        box-shadow:
	            0 10px 30px rgba(0, 0, 0, 0.08),
	            0 2px 6px rgba(0, 0, 0, 0.04);
	        animation: fadeIn 0.4s ease;
	    }

	    @keyframes fadeIn {
	        from {
	            opacity: 0;
	            transform: translateY(10px);
	        }
	        to {
	            opacity: 1;
	            transform: translateY(0);
	        }
	    }

	    h2 {
	        text-align: center;
	        margin-bottom: 28px;
	        font-size: 22px;
	        font-weight: 700;
	        letter-spacing: 0.5px;
	    }

	    form {
	        display: grid;
	        grid-template-columns: 1fr;
	        row-gap: 16px;
	    }

	    label {
	        font-size: 14px;
	        font-weight: 600;
	        color: var(--text-muted);
	    }

	    input[type="text"],
	    input[type="number"],
	    input[type="date"],
	    input[type="file"],
	    select,
	    textarea {
	        width: 100%;
	        padding: 11px 14px;
	        border: 1px solid var(--border);
	        border-radius: var(--radius);
	        font-size: 14px;
	        background: #fff;
	        transition: border 0.2s ease, box-shadow 0.2s ease;
	    }

	    textarea {
	        min-height: 90px;
	        resize: vertical;
	    }

	    input:focus,
	    select:focus,
	    textarea:focus {
	        border-color: var(--primary);
	        outline: none;
	        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
	    }

	    input[type="file"] {
	        padding: 8px;
	        font-size: 13px;
	        background: #f9fafb;
	    }

	    select {
	        cursor: pointer;
	    }

	    button {
	        margin-top: 10px;
	        background: var(--primary);
	        color: #fff;
	        padding: 14px;
	        border: none;
	        border-radius: 12px;
	        font-size: 16px;
	        font-weight: 600;
	        cursor: pointer;
	        letter-spacing: 0.3px;
	        transition: all 0.25s ease;
	    }

	    button:hover {
	        background: var(--primary-hover);
	        transform: translateY(-1px);
	        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
	    }

	    button:active {
	        transform: translateY(0);
	        box-shadow: none;
	    }

	    @media (max-width: 600px) {
	        .form-container {
	            width: 92%;
	            padding: 24px;
	        }

	        h2 {
	            font-size: 20px;
	        }
	    }
	</style>
</head>
<body>

<div class="form-container">
    <h2>Add SubCategory</h2>
	<form th:action="@{/admin/shop/add}"
	      th:object="${shop}"
	      method="post"
	      enctype="multipart/form-data">

	    <label>Shop Name:</label>
	    <input type="text" th:field="*{shopName}" required />

	    <label>Description:</label>
	    <textarea th:field="*{description}"></textarea>

	    <label>Start Date:</label>
	    <input type="date" th:field="*{startDate}" />

	    <label>End Date:</label>
	    <input type="date" th:field="*{endDate}" />

	    <label>Minimum Bid:</label>
	    <input type="number" th:field="*{minBid}" />

	    <label>Category:</label>
	    <select th:field="*{category}">
	        <option th:each="cat : ${categories}"
	                th:value="${cat.id}"
	                th:text="${cat.categoryName}">
	        </option>
	    </select>

	    <label>Primary Image:</label>
	    <input type="file" th:field="*{primaryImgFile}" />

	    <label>Other Images:</label>
	    <input type="file" th:field="*{shopImgFiles}" multiple />

	    <button type="submit">Save</button>
	</form>
</div>

</body>
</html>
