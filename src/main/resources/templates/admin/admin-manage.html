

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Manage Admins</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/4d6d36f9c1.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --primary-color: #6366f1;
            --gradient-bg: linear-gradient(135deg, #6366f1, #3b82f6);
            --text-light: #f1f5f9;
            --card-bg: #ffffff;
            --navbar-bg: #1e293b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #f8fafc;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            transition: transform 0.4s ease-in-out;
            z-index: 1000;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar a i { font-size: 18px; }

        .sidebar a:hover {
            background: var(--sidebar-hover);
            transform: translateX(6px);
        }

        .sidebar a.active {
            background: var(--primary-color);
            color: #fff;
            border-radius: 0 25px 25px 0;
        }

        /* Main content */
        .main-content {
            margin-left: 250px;
            width: calc(100% - 250px);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: margin-left 0.4s ease;
        }

        .navbar {
            background: var(--navbar-bg);
            padding: 15px 25px;
            color: white;
            font-size: 20px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
        }

        .toggle-btn {
            display: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 15px;
            transition: transform 0.3s ease;
        }

        .toggle-btn:hover { transform: rotate(90deg); }

        .container {
            padding: 30px;
            flex: 1;
            overflow-y: auto;
            max-width: 1200px;
            margin: auto;
            width: 100%;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box input {
            padding: 10px 12px;
            width: 260px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
        }

        .summary {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
        }

        .summary span { margin: 0 8px; }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        thead { background: #1e293b; color: white; }

        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            font-size: 15px;
        }

        tbody tr:hover {
            background: #f1f5f9;
            transition: 0.3s ease;
        }

        /* Role icons */
        .role-icon {
            font-size: 15px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            display: inline-block;
        }

        .master { background: #fef3c7; color: #b45309; }
        .normal { background: #e0f2fe; color: #0369a1; }

        /* Buttons */
        a.btn {
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }

        .btn-delete { background: #ef4444; color: white; }
        .btn-promote { background: #22c55e; color: white; }
        .btn-demote { background: #f59e0b; color: white; }
        .btn-view { background: #3b82f6; color: white; }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
            }

            .sidebar.active { transform: translateX(0); }

            .main-content {
                margin-left: 0;
                width: 100%;
            }

            .toggle-btn { display: block; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <a th:href="@{/admin/dashboard}"><i class="fas fa-house"></i> Home</a>
        <a th:href="@{/admin/category/all}"><i class="fas fa-folder-open"></i> Category</a>
        <a th:href="@{/admin/shop/all}"><i class="fas fa-boxes-stacked"></i> Shop</a>
        <a th:href="@{/admin/master/manage}" sec:authorize="hasRole('MASTER')" class="active"><i class="fas fa-user-gear"></i> Admin</a>
       
        <a th:href="@{/admin/logout}"><i class="fas fa-right-from-bracket"></i> Logout</a>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <div class="navbar">
            <span class="toggle-btn" onclick="toggleSidebar()">☰</span>
            Manage Admins
        </div>

        <div class="container">
            <h2>Manage Admins (Master Only)</h2>

            <!-- Top bar -->
            <div class="top-bar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Search admin...">
                </div>
                <div class="summary">
                    👑 Masters: <span th:text="${masterCount}"></span> |
                    👤 Normals: <span th:text="${normalCount}"></span> |
                    📊 Total: <span th:text="${admins.size()}"></span>
                </div>
            </div>

            <!-- Admin Table -->
            <table id="adminTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th><i class="fas fa-user"></i> Username</th>
                        <th><i class="fas fa-envelope"></i> Email</th>
                        <th><i class="fas fa-user-shield"></i> Role</th>
                        <th><i class="fas fa-cogs"></i> Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="admin : ${admins}">
                        <td th:text="${admin.id}"></td>
                        <td th:text="${admin.username}"></td>
                        <td th:text="${admin.email}"></td>
                        <td>
                            <span class="role-icon master" th:if="${admin.role.name() == 'MASTER'}">👑 Master</span>
                            <span class="role-icon normal" th:if="${admin.role.name() == 'NORMAL'}">👤 Normal</span>
                        </td>
                        <td>
                            <a th:if="${admin.role.name() == 'NORMAL'}" th:href="@{'/admin/master/promote/' + ${admin.id}}" class="btn btn-promote">
                                <i class="fas fa-arrow-up"></i> Promote
                            </a>
                            <a th:if="${admin.role.name() == 'MASTER'}" th:href="@{'/admin/master/demote/' + ${admin.id}}" class="btn btn-demote">
                                <i class="fas fa-arrow-down"></i> Demote
                            </a>
                            <a th:href="@{'/admin/master/delete/' + ${admin.id}}" class="btn btn-delete">
                                <i class="fas fa-trash"></i> Delete
                            </a>
                            <a th:href="@{'/admin/master/view/' + ${admin.id}}" class="btn btn-view">
                                <i class="fas fa-eye"></i> View
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Real-time search
        const searchInput = document.getElementById("searchInput");
        const tableRows = document.querySelectorAll("#adminTable tbody tr");

        searchInput.addEventListener("keyup", function () {
            const filter = searchInput.value.toLowerCase();
            tableRows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(filter) ? "" : "none";
            });
        });
    </script>
</body>
</html>
