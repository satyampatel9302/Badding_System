<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bidding Closed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            background-color: #ffffff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #dc3545;
        }
        p {
            font-size: 1.1rem;
            color: #495057;
        }
        .btn-home {
            background-color: #007bff;
            color: #ffffff;
            font-weight: 500;
            padding: 10px 25px;
            border-radius: 50px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .btn-home:hover {
            background-color: #0056b3;
            transform: scale(1.05);
            color: #ffffff;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🚫</div>
    <h1>Bidding Closed</h1>
    <p th:text="${message}">You cannot place a bid because the bidding for this shop has ended.</p>
    <a href="/user/shop" class="btn btn-home mt-3">Back to Shops</a>
</div>
</body>
</html>
