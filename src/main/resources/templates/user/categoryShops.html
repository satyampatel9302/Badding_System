


<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${category.categoryName} + ' - MobileMart'">Category</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
        }

		nav {
		    background: #222831;
		    padding: 1rem 2rem;
			height: 70px;
		}


        nav a {
            color: #eee;
            text-decoration: none;
            margin-right: 20px;
        }
		
		nav a {
		    transition: color 0.3s ease;
		}
		nav a:hover {
		    color: #ff9800 !important;
		}


        .products-container {
            max-width: 1500px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,.07);
            transition: transform .3s;
        }

        .product-card:hover {
            transform: translateY(-6px);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }

        .highestBid {
            color: #222831;
            font-weight: 700;
            font-size: 18px;
            transition: transform .2s, background-color .2s;
        }

		.btn-view {
		    background: #222831;
		    color: white;
		    width: 100%;
		    font-weight: 600;
		    border-radius: 8px;
		    transition: background-color 0.3s ease, color 0.3s ease;
		}

		.btn-view:hover {
		    background: #222831;   /* 🔥 NEW hover color */
		    color: #ffffff;        /* text white hi rahega */
		}

    </style>
</head>

<body>

<!-- NAV -->
<nav class="navbar" style="background:#333; padding:1rem 2rem; box-shadow:0 4px 8px rgba(0,0,0,0.2);">
    <div class="container-fluid">

        <!-- Logo LEFT -->
        <span class="navbar-brand text-white fw-bold fs-4">
            <i class="bi bi-graph-up-arrow"></i> Bidding System
        </span>

        <!-- Menu RIGHT -->
        <ul class="navbar-nav flex-row ms-auto gap-4 align-items-center">

            <li class="nav-item">
                <a class="nav-link text-white fw-medium"
                   th:href="@{/user/home}">
                    <i class="bi bi-house"></i> Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white fw-medium"
                   th:href="@{/user/shop}">
                    <i class="bi bi-bag"></i> Shop
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white fw-medium"
                   th:href="@{/user/profile}">
                    <i class="bi bi-person-circle"></i> Profile
                </a>
            </li>

        </ul>
    </div>
</nav>

<!-- PRODUCTS -->
<div class="products-container">

    <div th:each="sub : ${shops}" class="product-card">

        <img th:src="@{${sub.shop_primaryImg}}">

        <h5 th:text="${sub.shopName}"></h5>

		<p class="mb-1 text-muted">Highest Bid</p>
		<p>
		    ₹ <span class="highestBid"
		            th:attr="data-shop-id=${sub.id}"
		            th:text="${displayBids[sub.id]}">
		    </span>
		</p>

        <a th:href="@{'/user/shop/' + ${sub.id}}" class="btn btn-view">
            👁 View Auction
        </a>

    </div>
</div>

<!-- LIVE BID SCRIPT -->
<script>
    let socket = new SockJS('/bid-ws');
    let stompClient = Stomp.over(socket);

    stompClient.connect({}, () => {

        document.querySelectorAll('.highestBid').forEach(span => {

            let shopId = span.dataset.shopId;

            stompClient.subscribe('/topic/bids/' + shopId, msg => {

                let data = JSON.parse(msg.body);

                span.innerText = data.amount;

                // 🔥 Animate change
                span.classList.add("bid-updated");

                setTimeout(() => {
                    span.classList.remove("bid-updated");
                }, 600);
            });
        });
    });
</script>

</body>
</html>
