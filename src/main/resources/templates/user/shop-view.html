

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${shop.shopName} + ' | MobileMart'"></title>

    <!-- WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
	<link rel="stylesheet"
	      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        }

		nav {
		    background: #222831;
		    padding: 1rem 2rem;
		    display: flex;
		    justify-content: space-between;
		    color: white;
			height: 70px;
		}


        nav a {
            color: #eee;
            text-decoration: none;
            margin-left: 20px;
        }
		nav a {
		    transition: color 0.3s ease;
		}
		nav a:hover {
		    color: #ff9800 !important;
		}


        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 14px;
            display: flex;
            gap: 30px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.15);
        }

        .images { width: 42%; }
        .images img { width: 100%; border-radius: 12px; }

        .thumbs img {
            width: 80px;
            height: 80px;
            margin: 6px;
            border-radius: 8px;
            cursor: pointer;
        }

        .info { width: 58%; }

        .badge {
            background: #343a40;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: .85rem;
        }

        .auction-box {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 18px;
            border-left: 5px solid #343a40;
            border-radius: 10px;
        }

        #highestBid {
            font-size: 24px;
            font-weight: 700;
            color: #343a40;
        }

        .bid-input {
            padding: 10px;
            width: 65%;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .bid-btn {
            padding: 10px 18px;
            background: #343a40;
            border: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .bid-btn:hover {
            background: #222831;
        }
    </style>
</head>

<body>

	
	
	
	<nav class="navbar" style="background:#333; padding:1rem 2rem; box-shadow:0 4px 8px rgba(0,0,0,0.2);">
	    <div class="container-fluid">

	        <!-- Logo LEFT -->
	        <span class="navbar-brand text-white fw-bold fs-4">
	            <i class="bi bi-graph-up-arrow"></i> Bidding System
	        </span>

	        <!-- Menu RIGHT -->
	        <ul class="navbar-nav flex-row ms-auto gap-4 align-items-center">
	            <li class="nav-item">
	                <a class="nav-link text-white fw-medium" th:href="@{/user/home}">
	                    <i class="bi bi-house"></i> Home
	                </a>
	            </li>

	            <li class="nav-item">
	                <a class="nav-link text-white fw-medium" th:href="@{/user/shop}">
	                    <i class="bi bi-bag"></i> Shop
	                </a>
	            </li>

	            <li class="nav-item">
	                <a class="nav-link text-white fw-medium" th:href="@{/user/profile}">
	                    <i class="bi bi-person-circle"></i> Profile
	                </a>
	            </li>

	            <li class="nav-item">
	                <a class="btn btn-warning fw-semibold"
	                   th:href="@{|/user/bid/history/${shop.id}|}">
	                    <i class="fa-solid fa-list"></i> Bidding History
	                </a>
	            </li>
				<li class="nav-item">
				<a th:href="@{/user/shop/{id}/winner(id=${shop.id})}" class="btn btn-success mt-2">
				    See Winner
				</a>
               </li>
			   
			   <!-- 🔔 Bell ICON (THIS WAS MISSING) -->
			   				 <li class="position-relative">
			   				     <a href="javascript:void(0)" id="notificationBell" style="color:white;">
			   				         <i class="fa fa-bell"></i>
			   				         <span id="notification-count"
			   				               class="position-absolute top-0 start-100 translate-middle
			   				                      badge rounded-pill bg-danger">0</span>
			   				     </a>
			   				 </li>
	        </ul>

	    </div>
	</nav>

	<!-- 🔔 Notification Panel -->
	<div id="notification-panel"
	     style="display:none;
	            position: fixed;
	            top: 70px;
	            right: 20px;
	            width: 320px;
	            background: white;
	            border-radius: 10px;
	            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
	            z-index: 9999;">

	    <div style="padding: 12px; font-weight: bold; border-bottom: 1px solid #eee;">
	        🔔 Notifications
	    </div>

	    <ul id="notification-list"
	        style="list-style:none; padding: 10px; margin:0;
	               max-height: 300px; overflow-y: auto;">
	    </ul>
	</div>


<div class="container">

    <!-- Images -->
    <div class="images">
        <img id="mainImage" th:src="@{${shop.shop_primaryImg}}">
        <div class="thumbs">
            <img th:each="img : ${shop.shopImg}"
                 th:src="@{${img}}"
                 onclick="changeImage(this)">
        </div>
    </div>

    <!-- Info -->
    <div class="info">

        <span class="badge" th:text="${shop.category.categoryName}"></span>

        <h2 th:text="${shop.shopName}"></h2>

        <p><strong>Description:</strong> <span th:text="${shop.description}"></span></p>
        <p><strong>Minimum Bid:</strong> ₹<span th:text="${shop.minBid}"></span></p>
        <p><strong>Start Date:</strong> <span th:text="${shop.startDate}"></span></p>
        <p><strong>End Date:</strong> <span th:text="${shop.endDate}"></span></p>

		
		<!-- Current Highest Bid -->
		<p><strong>Current Highest Bid:</strong> ₹ 
		   <span id="highestBid" th:text="${highestBid != null ? highestBid.amount : shop.minBid}">0</span>
		</p>

		<div class="auction-box">
		    <h4>📢 Place Your Bid</h4>
		    <p id="bidStatus" style="font-weight:600;"></p>

		    <form th:action="@{/user/bid/{id}(id=${shop.id})}" method="post">
		        <input id="bidInput" type="number" name="amount" class="bid-input"
		            placeholder="Enter your bid"
		            th:attr="min=${highestBid != null ? highestBid.amount + 1 : shop.minBid}"
		            required>
		        <button class="bid-btn">Place Bid</button>
		    </form>

		    <small>Minimum allowed bid: ₹
		        <span id="minAllowed" th:text="${highestBid != null ? highestBid.amount + 1 : shop.minBid}">0</span>
		    </small>
		</div>
    </div>
</div>

<script>
    function changeImage(img) {
        document.getElementById("mainImage").src = img.src;
    }
</script>


<script th:inline="javascript">
/*<![CDATA[*/
let shopId = /*[[${shop.id}]]*/ 0;
let loggedInUser = /*[[${#authentication.name}]]*/ "";

let socket = new SockJS('/bid-ws');
let stompClient = Stomp.over(socket);

stompClient.connect({}, function () {
    stompClient.subscribe('/topic/bids/' + shopId, function (response) {
        let data = JSON.parse(response.body);

        // Update highest bid only
        document.getElementById("highestBid").innerText = data.amount;

        // Update form input min and minAllowed
        document.getElementById("bidInput").min = data.amount + 1;
        document.getElementById("minAllowed").innerText = data.amount + 1;

        let status = document.getElementById("bidStatus");
        if (data.bidderEmail === loggedInUser) {
            status.innerText = "✅ Your bid is now the highest!";
            status.style.color = "#00b894";
        } else {
            status.innerText = "⚠️ You have been outbid!";
            status.style.color = "#d63031";
        }

        setTimeout(() => status.innerText = "", 3000);
    });
});
/*]]>*/
</script>

<!-- LIVE BID SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<div id="toast-container"></div>

<!-- JS -->
<script>


// Toast function
function showToast(message) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
}


let notificationCount = 0;

stompClient.connect({}, () => {



  // Global Notifications
  stompClient.subscribe('/topic/bid-alerts', msg => {
    let data = JSON.parse(msg.body);
    notificationCount++;
    document.getElementById("notification-count").innerText = notificationCount;

    showToast("🔔 <b>New Bid</b><br>" + data.bidderName + " bid ₹" + data.amount + "<br><small>" + data.shopName + "</small>");

    let li = document.createElement("li");
    li.style.padding = "8px";
    li.style.borderBottom = "1px solid #eee";
    li.innerHTML = "<b>" + data.bidderName + "</b> bid ₹" + data.amount + "<br><small>" + data.shopName + "</small>";
    document.getElementById("notification-list").prepend(li);
  });
});

// Notification Bell toggle
document.getElementById("notificationBell").addEventListener("click", function () {
  const panel = document.getElementById("notification-panel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
  document.getElementById("notification-count").innerText = 0;
});
</script>

</body>
</html>
