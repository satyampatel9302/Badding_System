<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<title>User Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #222831, #393e46); /* unified dark theme */
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== NAVBAR ===== */
nav {
  background: #222831;
  padding: 1rem 2rem;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

nav a {
  color: #f1f1f1 !important;
  font-weight: 700;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #ffc107 !important;
}

.navbar-nav .btn-link {
  color: #ff9800;
  font-weight: 700;
}

.navbar-nav .btn-link:hover {
  text-decoration: underline;
}

/* ===== PROFILE CARD ===== */
.profile-card {
  max-width: 650px;
  margin: 90px auto;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(16px);
  border-radius: 18px;
  padding: 45px;
  color: #fff;
  text-align: center;
  box-shadow: 0 10px 35px rgba(0,0,0,0.25);
  animation: slideIn 1s ease forwards;
  transform: translateY(-50px);
  opacity: 0;
}

@keyframes slideIn {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.profile-card h2 {
  font-size: 30px;
  margin-bottom: 15px;
}

.welcome-message {
  font-size: 20px;
  color: #ffe082;
  margin-bottom: 30px;
}

/* Info */
.profile-info {
  text-align: left;
  font-size: 17px;
  margin-bottom: 30px;
}

.profile-info p {
  margin-bottom: 10px;
}

.profile-info p span {
  color: #00b894; /* highlight for values */
  font-weight: 500;
}

/* Buttons */
.profile-actions .btn {
  width: 100%;
  margin-bottom: 12px;
  font-weight: 600;
  transition: transform 0.2s ease, background 0.3s ease;
}

.profile-actions .btn-warning {
  background: linear-gradient(90deg, #ff6a00, #ee0979);
  border: none;
  color: white;
}

.profile-actions .btn-warning:hover {
  background: linear-gradient(90deg, #ee0979, #ff6a00);
  transform: scale(1.05);
}

.profile-actions .btn-outline-light {
  border: 1px solid #fff;
  color: #fff;
}

.profile-actions .btn-outline-light:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.05);
}

/* Footer */
footer {
  background: #222831;
  color: #fff;
  text-align: center;
  font-size: 13px;
  padding: 15px 0;
  margin-top: auto;
}

footer a {
  color: #ffc107;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}

@media (max-width: 480px) {
  .profile-card {
    padding: 30px 20px;
    margin-top: 50px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container-fluid">

    <!-- Logo LEFT -->
    <span class="navbar-brand text-white fw-bold fs-4">
     <i class="bi bi-graph-up-arrow"></i> Bidding System
    </span>

    <!-- Menu RIGHT -->
    <ul class="navbar-nav flex-row ms-auto gap-4 align-items-center">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/user/home}">
          <i class="bi bi-house"></i> Home
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/user/shop}">
          <i class="bi bi-bag"></i> Shop
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" th:href="@{/user/profile}">
          <i class="bi bi-person-circle"></i> Profile
        </a>
      </li>
      <li class="nav-item">
        <form th:action="@{/user/logout}" method="post">
          <button class="nav-link btn btn-link p-0">
            <i class="bi bi-box-arrow-right"></i> Logout
          </button>
        </form>
      </li>
    </ul>

  </div>
</nav>

<!-- PROFILE CARD -->
<div class="profile-card">

  <h2><i class="bi bi-person-circle"></i> My Profile</h2>

  <div class="welcome-message">
    👋 Welcome, <span th:text="${user.name}">User</span>
  </div>

  <div class="profile-info">
    <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
    <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
    <p><strong>User ID:</strong> <span th:text="${user.id}"></span></p>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="profile-actions">
    <a th:href="@{/user/my-bids}" class="btn btn-warning">
      <i class="bi bi-hammer"></i> See Your Bids
    </a>

    <a th:href="@{/user/home}" class="btn btn-outline-light">
      <i class="bi bi-arrow-left-circle"></i> Back to Home
    </a>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p class="mb-1">© 2025 MobailMart. All rights reserved.</p>
  <p>
    <a href="#">Privacy</a> |
    <a href="#">Terms</a> |
    <a href="#">Contact</a>
  </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
