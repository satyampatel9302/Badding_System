<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bidding History</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f6f9;
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #222;
        }

        .subcat-name {
            text-align: center;
            font-size: 18px;
            color: #007bff;
            margin-bottom: 30px;
        }

        .bid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .bid-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
        }

        .bid-card:hover {
            transform: translateY(-4px);
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .user-email {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }

        .bid-amount {
            font-size: 22px;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 6px;
        }

        .bid-time {
            font-size: 14px;
            color: #666;
        }

        .badge {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 20px;
            background-color: #e9f2ff;
            color: #007bff;
        }

        .back-btn {
            display: block;
            width: fit-content;
            margin: 40px auto 0;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
        }

        .back-btn:hover {
            background-color: #0056b3;
        }

        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
        }
    </style>
</head>

<body>

<h2>Bidding History</h2>
<div class="subcat-name">
    <span th:text="${shop.shopName}"></span>
</div>

<div class="bid-container">

    <div class="bid-card" th:each="bid : ${bids}">
        <div class="user-name" th:text="${bid.user.name}"></div>
        <div class="user-email" th:text="${bid.user.email}"></div>

        <div class="bid-amount">
            ₹ <span th:text="${bid.amount}"></span>
        </div>

        <div class="bid-time">
            ⏰ <span th:text="${#temporals.format(bid.bidTime, 'dd MMM yyyy, hh:mm a')}"></span>
        </div>

        <div class="badge">
            Bid Placed
        </div>
    </div>

</div>

<a class="back-btn"
   th:href="@{/user/shop/{id}(id=${shop.id})}">
    ← Back
</a>

</body>
</html>
