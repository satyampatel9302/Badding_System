spring.application.name=Badding_System

spring.datasource.url=jdbc:mysql://localhost:3306/badding_system_db

spring.datasource.username={your db user name}

spring.datasource.password={your db password}

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.hibernate=debug


spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username={your smtp username }
spring.mail.password={your smtp password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from={your smtp mail}



server.port=9097